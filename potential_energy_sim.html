<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>승빈쌤의 시뮬레이션 실험</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f7f6; }
        .main-wrapper { display: flex; gap: 20px; align-items: flex-start; max-width: 1400px; }
        canvas { border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); background: #fff; }
        .side-panel { display: flex; flex-direction: column; gap: 20px; width: 350px; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .panel-title { font-size: 16px; font-weight: bold; color: #34495e; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .control-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        label { font-size: 13px; font-weight: bold; color: #555; }
        .value-span { font-family: 'Courier New', monospace; font-weight: bold; color: #e67e22; font-size: 14px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: background 0.2s; }
        .btn-launch { background: #3498db; }
        .btn-reset { background: #95a5a6; }
        .data-panel { background: #2c3e50; color: white; }
        .energy-info { font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .total-energy { font-size: 16px; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; margin-top: 10px; }
        .height-info { font-size: 18px; color: #FFEB3B; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;}
    </style>
</head>
<body>

    <h2>승빈쌤의 시뮬레이션 실험: 역학적에너지 보존</h2>
    
    <div class="main-wrapper">
        <div id="canvas-container"></div>
        <div class="side-panel">
            <div class="panel data-panel">
                <div class="panel-title">실시간 측정 데이터</div>
                <div class="energy-info height-info"><span>현재 높이 (\(h\))</span> <span><span id="h-txt">0.0</span> m</span></div>
                <div class="energy-info"><span style="color:#f1c40f">● 위치 에너지 (\(E_p\))</span> <span id="pe-txt">0</span> J</div>
                <div class="energy-info"><span style="color:#2ecc71">● 운동 에너지 (\(E_k\))</span> <span id="ke-txt">0</span> J</div>
                <div class="energy-info"><span style="color:#e74c3c">● 손실 에너지 (\(E_{loss}\))</span> <span id="le-txt">0</span> J</div>
                <div class="energy-info total-energy"><span>역학적 에너지 합 (\(E_p+E_k\))</span> <span id="te-txt">0</span> J</div>
            </div>

            <div class="panel controls">
                <div class="panel-title">물리 환경 설정</div>
                <div class="control-group">
                    <div class="label-row"><label>초기 속력 \(v_0\) (m/s)</label><span id="v0-val" class="value-span">60</span></div>
                    <input type="range" id="v0-slider" min="10" max="100" step="1" value="60">
                </div>
                <div class="control-group">
                    <div class="label-row"><label>질량 \(m\) (kg)</label><span id="m-val" class="value-span">10</span></div>
                    <input type="range" id="m-slider" min="1" max="100" step="1" value="10">
                </div>
                <div class="control-group">
                    <div class="label-row"><label>중력가속도 \(g\)</label><span id="g-val" class="value-span">9.8</span></div>
                    <input type="range" id="g-slider" min="1" max="100" step="0.5" value="9.8">
                </div>
                <div class="control-group">
                    <div class="label-row"><label>공기저항 계수 \(k\)</label><span id="k-val" class="value-span">0.000</span></div>
                    <input type="range" id="k-slider" min="0" max="0.5" step="0.001" value="0.000">
                </div>
                <div class="control-group">
                    <div class="label-row"><label>섬광 간격 (s)</label><span id="strobe-val" class="value-span">0.20</span></div>
                    <input type="range" id="strobe-slider" min="0.05" max="1.0" step="0.01" value="0.20">
                </div>
                <div class="btn-group">
                    <button class="btn-launch" onclick="launch()">발사하기</button>
                    <button class="btn-reset" onclick="resetSim()">초기화</button>
                </div>
            </div>
        </div>
    </div>

<script>
let y, v, ground, initialEnergy;
let isMoving = false;
let totalLoss = 0;
let history = []; 
let strobeHistory = []; 
let simTime = 0, lastStrobeTime = 0;
// 스케일링 계수 조정: 높이가 충분히 보이도록 캔버스 높이 및 계수 최적화
const visualScale = 3; 

function setup() {
    // 상승 과정이 잘 보이도록 캔버스 높이를 800px로 확대
    let canvas = createCanvas(800, 800);
    canvas.parent('canvas-container');
    // 바닥 위치 조정
    ground = 600;
    resetSim();
}

function resetSim() {
    y = ground - 20; v = 0; totalLoss = 0; simTime = 0; lastStrobeTime = 0;
    isMoving = false; history = []; strobeHistory = [];
}

function launch() {
    resetSim();
    let v0 = parseFloat(document.getElementById('v0-slider').value);
    let m = parseFloat(document.getElementById('m-slider').value);
    let g = parseFloat(document.getElementById('g-slider').value);
    
    y = ground - 20;
    v = -v0; // 초기 속도를 m/s 단위로 설정 (위 방향)
    initialEnergy = 0.5 * m * (v * v); 
    isMoving = true;
    strobeHistory.push(y);
}

function draw() {
    background(255);
    let m = parseFloat(document.getElementById('m-slider').value);
    let g = parseFloat(document.getElementById('g-slider').value);
    let k = parseFloat(document.getElementById('k-slider').value);
    let strobeInterval = parseFloat(document.getElementById('strobe-slider').value);

    // UI 업데이트
    document.getElementById('v0-val').innerText = document.getElementById('v0-slider').value;
    document.getElementById('m-val').innerText = m;
    document.getElementById('g-val').innerText = g.toFixed(1);
    document.getElementById('k-val').innerText = k.toFixed(3);
    document.getElementById('strobe-val').innerText = strobeInterval.toFixed(2);

    if (isMoving) {
        let dt = 1/60; 
        let subSteps = 60; // 정밀 연산
        let sdt = dt / subSteps;

        for (let i = 0; i < subSteps; i++) {
            let airForce = -k * v;
            // 중력 및 저항 가속도 계산 (m/s^2 단위 유지)
            let acceleration = g + (airForce / m);
            
            totalLoss += Math.abs(airForce * v * sdt);
            
            v += acceleration * sdt;
            // 시각적 스케일링 적용하여 캔버스 좌표 업데이트
            y += v * sdt * visualScale; 

            simTime += sdt;
            if (simTime - lastStrobeTime >= strobeInterval) {
                strobeHistory.push(y);
                lastStrobeTime = simTime;
            }

            // 바닥 정지
            if (y >= ground - 20) {
                y = ground - 20;
                v = 0;
                isMoving = false;
                break; 
            }
        }
    }

    // 물리적 높이 계산 (m 단위)
    let currentH = Math.max(0, (ground - 20 - y) / visualScale);
    let Ep = m * g * currentH;
    let Ek = 0.5 * m * (v * v);
    
    // 에너지 오차 보정 (k=0일 때)
    if (k === 0 && isMoving) {
        Ek = Math.max(0, initialEnergy - Ep);
    }

    if (isMoving) {
        history.push({ep: Ep, ek: Ek, total: Ep + Ek});
    }

    // --- 시뮬레이션 드로잉 영역 (상단) ---
    let simAreaH = ground + 20;
    fill(248, 249, 250); noStroke(); rect(0, 0, width, simAreaH);
    
    // ** 10m 간격 높이 선 및 텍스트 그리기 **
    stroke(220); strokeWeight(1); drawingContext.setLineDash([5, 5]); // 점선 설정
    fill(150); textAlign(RIGHT, CENTER); textSize(11); noStroke();
    
    for (let h_grid = 0; h_grid <= 200; h_grid += 10) {
        let y_grid = ground - 20 - (h_grid * visualScale);
        if (y_grid < 15) continue; // 화면 최상단 경계
        
        // 점선
        stroke(220); drawingContext.setLineDash([5, 5]);
        line(100, y_grid, width - 100, y_grid);
        
        // 높이 수치 텍스트
        noStroke();
        text(h_grid + " m", 90, y_grid);
    }
    drawingContext.setLineDash([]); // 점선 해제

    // 바닥선
    stroke(189, 195, 199); strokeWeight(3); line(100, ground, width - 100, ground);
    
    // 섬광 사진
    noStroke(); fill(52, 152, 219, 60);
    strobeHistory.forEach(pos => ellipse(width/2, pos, 25));
    // 현재 공
    fill(52, 152, 219); ellipse(width/2, y, 30);

    // --- 에너지 그래프 영역 (하단) ---
    // 시뮬레이션 공간 확대로 그래프 위치 하향 조정
    let gx = 80, gy = 620, gw = width - 160, gh = 160;
    fill(255); stroke(220); strokeWeight(1); rect(gx, gy, gw, gh, 5);
    
    if (history.length > 1) {
        let maxE = initialEnergy;
        let vScale = gh / (maxE * 1.1);
        let hScale = gw / history.length;

        noFill(); strokeWeight(2);
        // Ep (Yellow)
        stroke(241, 196, 15); beginShape();
        history.forEach((d, i) => vertex(gx + i * hScale, gy + gh - d.ep * vScale));
        endShape();
        // Ek (Green)
        stroke(46, 204, 113); beginShape();
        history.forEach((d, i) => vertex(gx + i * hScale, gy + gh - d.ek * vScale));
        endShape();
        // Total (Blue)
        stroke(52, 152, 219); strokeWeight(3); beginShape();
        history.forEach((d, i) => vertex(gx + i * hScale, gy + gh - d.total * vScale));
        endShape();
    }

    // --- 데이터 표시 업데이트 ---
    document.getElementById('h-txt').innerText = currentH.toFixed(1);
    document.getElementById('pe-txt').innerText = Ep.toFixed(0);
    document.getElementById('ke-txt').innerText = Ek.toFixed(0);
    document.getElementById('le-txt').innerText = totalLoss.toFixed(0);
    document.getElementById('te-txt').innerText = (Ep + Ek).toFixed(0);
}
</script>
</body>
</html>
